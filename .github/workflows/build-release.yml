name: Build Release App

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-release:
    runs-on: macos-14
    env:
      HAS_SIGNING_SECRETS: ${{ secrets.APPLE_SIGNING_CERTIFICATE_BASE64 != '' && secrets.APPLE_SIGNING_CERTIFICATE_PASSWORD != '' && secrets.APPLE_SIGNING_IDENTITY != '' && secrets.APPLE_KEYCHAIN_PASSWORD != '' }}
      HAS_NOTARY_SECRETS: ${{ secrets.APPLE_NOTARY_API_KEY_BASE64 != '' && secrets.APPLE_NOTARY_KEY_ID != '' && secrets.APPLE_NOTARY_ISSUER_ID != '' }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Derive app version
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            echo "APP_VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"
          else
            VERSION="$(/usr/libexec/PlistBuddy -c 'Print :CFBundleShortVersionString' Resources/Info.plist)"
            echo "APP_VERSION=$VERSION" >> "$GITHUB_ENV"
          fi

      - name: Install blueutil
        run: brew install blueutil

      - name: Install Apple signing certificate
        if: env.HAS_SIGNING_SECRETS == 'true'
        env:
          APPLE_SIGNING_CERTIFICATE_BASE64: ${{ secrets.APPLE_SIGNING_CERTIFICATE_BASE64 }}
          APPLE_SIGNING_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_SIGNING_CERTIFICATE_PASSWORD }}
          APPLE_KEYCHAIN_PASSWORD: ${{ secrets.APPLE_KEYCHAIN_PASSWORD }}
        run: |
          CERT_PATH="$RUNNER_TEMP/apple_signing_certificate.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"

          echo "$APPLE_SIGNING_CERTIFICATE_BASE64" | base64 --decode > "$CERT_PATH"

          security create-keychain -p "$APPLE_KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$APPLE_KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$APPLE_SIGNING_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$APPLE_KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

      - name: Install notarization key
        if: env.HAS_NOTARY_SECRETS == 'true'
        env:
          APPLE_NOTARY_API_KEY_BASE64: ${{ secrets.APPLE_NOTARY_API_KEY_BASE64 }}
        run: |
          NOTARY_KEY_PATH="$RUNNER_TEMP/AuthKey.p8"
          echo "$APPLE_NOTARY_API_KEY_BASE64" | base64 --decode > "$NOTARY_KEY_PATH"
          echo "APPLE_NOTARY_KEY_PATH=$NOTARY_KEY_PATH" >> "$GITHUB_ENV"

      - name: Build packaged app
        env:
          APP_VERSION: ${{ env.APP_VERSION }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          ENABLE_NOTARIZATION: ${{ env.HAS_NOTARY_SECRETS == 'true' && env.HAS_SIGNING_SECRETS == 'true' && '1' || '0' }}
          APPLE_NOTARY_KEY_PATH: ${{ env.APPLE_NOTARY_KEY_PATH }}
          APPLE_NOTARY_KEY_ID: ${{ secrets.APPLE_NOTARY_KEY_ID }}
          APPLE_NOTARY_ISSUER_ID: ${{ secrets.APPLE_NOTARY_ISSUER_ID }}
        run: ./package-release.sh

      - name: Upload packaged app artifact
        uses: actions/upload-artifact@v4
        with:
          name: AirPods-Fix-${{ env.APP_VERSION }}
          path: dist/*.dmg
          if-no-files-found: error

      - name: Publish tagged release asset
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${GITHUB_REF#refs/tags/}"

          if gh release view "$tag" >/dev/null 2>&1; then
            notes_file="$RUNNER_TEMP/release-notes.md"
            gh api \
              --method POST \
              -H "Accept: application/vnd.github+json" \
              "/repos/${GITHUB_REPOSITORY}/releases/generate-notes" \
              -f tag_name="$tag" \
              -f target_commitish="${GITHUB_SHA}" \
              --jq '.body' > "$notes_file"
            gh release edit "$tag" --title "$tag" --notes-file "$notes_file"
            gh release upload "$tag" dist/*.dmg --clobber
          else
            gh release create "$tag" dist/*.dmg --title "$tag" --generate-notes
          fi

      - name: Clean up signing assets
        if: ${{ always() && env.HAS_SIGNING_SECRETS == 'true' }}
        run: |
          security delete-keychain "$RUNNER_TEMP/app-signing.keychain-db" || true
          rm -f "$RUNNER_TEMP/apple_signing_certificate.p12"
          rm -f "$RUNNER_TEMP/AuthKey.p8"
